<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exceptional Goodies</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="newstyle.css">
</head>
<body>

    <div class="container mt-5">
        <h1 class="text-center mb-5 display-4 fw-bold">Exceptional Goodies</h1>

        <div class="row g-4">
            
            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" class="img-fluid product-image" alt="Watch">
                    <div class="card-body">
                        <h5 class="card-title">Smart Watch</h5>
                        <p class="price-text">R1 499,99</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="img-fluid product-image" alt="Headphones">
                    <div class="card-body">
                        <h5 class="card-title">Headphones</h5>
                        <p class="price-text">R2 850,50</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1517668808822-9ebb02f2a0e6?w=400" class="img-fluid product-image" alt="Coffee Maker">
                    <div class="card-body">
                        <h5 class="card-title">Coffee Maker</h5>
                        <p class="price-text">R3 100,00</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?w=400" class="img-fluid product-image" alt="Clock">
                    <div class="card-body">
                        <h5 class="card-title">Minimalist Clock</h5>
                        <p class="price-text">R450,95</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=400" class="img-fluid product-image" alt="Keyboard">
                    <div class="card-body">
                        <h5 class="card-title">Mechanical Keyboard</h5>
                        <p class="price-text">R1 200,00</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=400" class="img-fluid product-image" alt="Laptop">
                    <div class="card-body">
                        <h5>Gaming Laptop</h5>
                        <p class="price-text">R18 500,00</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400" class="img-fluid product-image" alt="Sunglasses">
                    <div class="card-body">
                        <h5>Sunglasses</h5>
                        <p class="price-text">R1 250,00</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1583394838336-acd977736f90?w=400" class="img-fluid product-image" alt="Controller">
                    <div class="card-body">
                        <h5>Game Controller</h5>
                        <p class="price-text">R950,50</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400" class="img-fluid product-image" alt="Smartphone">
                    <div class="card-body">
                        <h5>Smartphone</h5>
                        <p class="price-text">R9 999,99</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4 col-sm-6">
                <div class="card product-card">
                    <img src="https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=400" class="img-fluid product-image" alt="Tablet">
                    <div class="card-body">
                        <h5>Tablet</h5>
                        <p class="price-text">R5 600,00</p>
                        <button class="btn btn-primary w-100">Buy</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4 text-center mb-4 mb-md-0">
                    <img src="https://cdn-icons-png.flaticon.com/512/3081/3081840.png" alt="Logo" class="footer-logo">
                    <p class="mt-2 fw-bold">Exceptional Goodies</p>
                </div>

                <div class="col-md-8">
                    <form class="row g-3">
                        <div class="col-sm-5">
                            <input type="text" class="form-control" placeholder="Full Name">
                        </div>
                        <div class="col-sm-5">
                            <input type="email" class="form-control" placeholder="Email Address">
                        </div>
                        <div class="col-sm-2">
                            <button type="button" class="btn btn-dark w-100">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
